<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard</title>
</head>
<body style="font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6;">

    {% if show_login %}
    <div style="max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;">
        <h2>Lecturer Portal Login</h2>
        <p style="color: #666;">Enter your security key to view the attendance roster.</p>
        
        {% if error %}
            <p style="color: red; font-weight: bold;">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/lecturer/dashboard">
            <input type="password" name="password" placeholder="Enter Password" required 
                   style="width: 85%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
            <br>
            <button type="submit" style="width: 90%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px;">
                Unlock Dashboard
            </button>
        </form>
    </div>

    {% else %}
    <div style="max-width: 900px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h1>KTU Attendance Roster</h1>
            <a href="/lecturer/logout" style="color: red; text-decoration: none; font-weight: bold;">Logout 🚪</a>
        </div>

        <div style="margin: 20px 0;">
            <button id="copyBtn" onclick="copyRosterToClipboard()" style="padding: 12px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                📋 Copy Names for Class Registry
            </button>
            <span id="copyFeedback" style="margin-left: 10px; color: #28a745; font-weight: bold; display: none;">Copied to clipboard!</span>
        </div>
    </div>

    <script>
    function copyRosterToClipboard() {
        const rows = document.querySelectorAll("table tr");
        let textToCopy = "";
        rows.forEach((row, index) => {
            if (index === 0) return; 
            const columns = row.querySelectorAll("td");
            if (columns.length >= 2) {
                const name = columns[0].innerText.trim();
                const indexNum = columns[1].innerText.trim();
                textToCopy += name + "\t" + indexNum + "\n";
            }
        });
        navigator.clipboard.writeText(textToCopy).then(() => {
            const feedback = document.getElementById("copyFeedback");
            feedback.style.display = "inline";
            setTimeout(() => { feedback.style.display = "none"; }, 3000);
        });
    }
    </script>
    {% endif %}

</body>
</html>
