<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Dashboard</title>
    </head>
<body>

    {% if show_login %}
    <div style="max-width: 400px; margin: 100px auto; padding: 30px; background: white; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; font-family: sans-serif;">
        <h2>Lecturer Portal Login</h2>
        <p style="color: #666;">Enter your security key to view the attendance roster.</p>
        
        {% if error %}
            <p style="color: red; font-weight: bold;">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/lecturer/dashboard">
            <input type="password" name="password" placeholder="Enter Password" required 
                   style="width: 85%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
            <br>
            <button type="submit" style="width: 90%; padding: 12px; background-color: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">
                Unlock Dashboard
            </button>
        </form>
    </div>

    {% else %}
    <div>
        
        <div style="margin-bottom: 15px;">
            <a href="/" style="text-decoration: none; color: #007bff; font-weight: bold; font-size: 14px;">
                ⬅️ Go to Student Sign-In Form
            </a>
        </div>

        <div style="margin: 20px 0;">
            <button id="copyBtn" onclick="copyRosterToClipboard()" style="padding: 10px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                📋 Copy Names for Class Registry
            </button>
            <span id="copyFeedback" style="margin-left: 10px; color: #28a745; font-weight: bold; display: none;">Copied!</span>
        </div>

        </div>

    <script>
    function copyRosterToClipboard() {
        const rows = document.querySelectorAll("table tr");
        let textToCopy = "";
        rows.forEach((row, index) => {
            if (index === 0) return; // Skip header
            const columns = row.querySelectorAll("td");
            if (columns.length >= 2) {
                const name = columns[0].innerText.trim();
                const indexNum = columns[1].innerText.trim();
                textToCopy += name + "\t" + indexNum + "\n";
            }
        });
        navigator.clipboard.writeText(textToCopy).then(() => {
            const feedback = document.getElementById("copyFeedback");
            feedback.style.display = "inline";
            setTimeout(() => { feedback.style.display = "none"; }, 3000);
        });
    }
    </script>

    {% endif %}

</body>
</html>
