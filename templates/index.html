<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Student Attendance Sign-In</title>
    <style>
        body {
            background-color: #0b132b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h2 { margin-top: 0; font-size: 24px; text-align: center; }
        p.desc { text-align: center; color: #64748b; font-size: 13px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; text-transform: uppercase; font-size: 11px; color: #64748b; margin-bottom: 8px; font-weight: 700; }
        .input-control {
            width: 100%;
            background-color: #0b132b;
            border: 1px solid #1e293b;
            border-radius: 6px;
            padding: 14px;
            color: #ffffff;
            font-size: 15px;
            box-sizing: border-box;
        }
        .input-control:disabled {
            background-color: #1c2541;
            color: #475569;
            cursor: not-allowed;
            border-color: #1e293b;
        }
        .btn-submit {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 15px;
            margin-top: 5px;
        }
        .btn-submit:disabled {
            background-color: #334155;
            color: #64748b;
            cursor: not-allowed;
        }
        .status-badge {
            display: block;
            text-align: center;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .status-open { background-color: #16a34a33; color: #4ade80; border: 1px solid #16a34a; }
        .status-closed { background-color: #dc262633; color: #f87171; border: 1px solid #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Student Sign-In</h2>
        <p class="desc">Log your attendance records for the current session</p>

        {% if session_active %}
            <span class="status-badge status-open">🟢 Submissions Active</span>
        {% else %}
            <span class="status-badge status-closed">🔴 Locked — Attendance Closed</span>
        {% endif %}

        <form id="attendanceForm">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter Full Name" required class="input-control" {% if not session_active %}disabled{% endif %}>
            </div>
            <div class="form-group">
                <label>Index Number</label>
                <input type="text" name="index_number" placeholder="Enter Index Number" required class="input-control" {% if not session_active %}disabled{% endif %}>
            </div>
            <div class="form-group">
                <label>Class Access Code (OTP)</label>
                <input type="text" name="otp" placeholder="Enter 4-Digit Code on Board" required class="input-control" style="text-align: center; font-weight: bold; font-size: 18px; letter-spacing: 2px;" {% if not session_active %}disabled{% endif %}>
            </div>
            <button type="submit" class="btn-submit" {% if not session_active %}disabled{% endif %}>Submit Attendance</button>
        </form>
    </div>

    <script>
        document.getElementById('attendanceForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            fetch('/submit', {
                method: 'POST',
                body: formData
            })
            .then(async response => {
                const text = await response.text();
                alert(text);
                if (response.ok) {
                    window.location.reload();
                }
            })
            .catch(err => alert("Error saving record connection."));
        });
    </script>
</body>
</html>
