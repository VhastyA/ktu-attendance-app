<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Attendance Roster</title>
    <style>
        body {
            background-color: #0b132b;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px 30px;
        }
        .container {
            max-width: 1050px;
            margin: 0 auto;
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid #1c2541;
            padding-bottom: 20px;
            margin-bottom: 35px;
        }
        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #64748b;
            margin: 6px 0 0 0;
            font-size: 14px;
        }
        .btn-nav {
            background: #2563eb;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-nav:hover {
            background: #1d4ed8;
        }
        .card {
            background-color: #0f172a;
            border: 1px solid #1e293b;
            border-radius: 8px;
            padding: 30px;
        }
        .registry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .btn-copy {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-copy:hover {
            background-color: #15803d;
        }
        .btn-clear {
            background: transparent;
            color: #ef4444;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .btn-clear:hover {
            text-decoration: underline;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            text-align: left;
            padding: 14px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 15px;
        }
        th {
            color: #64748b;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        .empty-message {
            color: #64748b;
            padding: 40px 0;
            text-align: center;
            font-size: 14px;
        }
        .feedback {
            color: #16a34a;
            margin-left: 12px;
            font-weight: 600;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-section">
            <div>
                <h1>Live Attendance Roster</h1>
                <p class="subtitle">Active logs for today's lecture</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <a href="/lecturer/roster" class="btn-nav">⚙️ Class Registry Setup</a>
                <a href="/lecturer/logout" style="color: #ef4444; text-decoration: none; font-size: 14px; font-weight: 600;">Logout 🚪</a>
            </div>
        </div>

        <div class="card">
            <div class="registry-header">
                <div>
                    <button onclick="copyToClipboard()" class="btn-copy">📋 Copy Names for Class Registry</button>
                    <span id="copyFeedback" class="feedback">Copied!</span>
                </div>
                <form method="POST" action="/lecturer/clear" onsubmit="return confirm('Wipe attendance session sheet?');">
                    <button type="submit" class="btn-clear">🗑️ Clear Live Roster</button>
                </form>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 10%;">#</th>
                        <th style="width: 55%;">Student Name</th>
                        <th style="width: 35%;">Index Number</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td style="color: #334155;">{{ loop.index }}</td>
                        <td>{{ student.name }}</td>
                        <td style="color: #64748b;">{{ student.index_number }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="empty-message">No sign-ins tracked yet for this class session.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

    <script>
        function copyToClipboard() {
            let text = "";
            document.querySelectorAll("table tbody tr").forEach(row => {
                const cols = row.querySelectorAll("td");
                if(cols.length >= 3 && !row.querySelector('.empty-message')) {
                    text += cols[1].innerText.trim() + "\t" + cols[2].innerText.trim() + "\n";
                }
            });
            if(!text) { alert("No data to copy."); return; }
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById("copyFeedback").style.display = "inline";
                setTimeout(() => { document.getElementById("copyFeedback").style.display = "none"; }, 2000);
            });
        }
    </script>
</body>
</html>
